services:
  setup-env:
    image: alpine:3.20
    container_name: meridian-setup-env
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: ["sh", "/workspace/scripts/bootstrap_runtime.sh"]

  mysql:
    image: mysql:8.4
    container_name: meridian-mysql
    restart: unless-stopped
    depends_on:
      setup-env:
        condition: service_completed_successfully
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-meridian}
      MYSQL_USER: ${MYSQL_USER:-meridian_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-meridian_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-meridian_root_password}
      TZ: ${TZ:-Africa/Addis_Ababa}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - ./.mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app-dev:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: meridian-app-dev
    restart: unless-stopped
    depends_on:
      setup-env:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
    working_dir: /workspace/backend
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-meridian}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Africa/Addis_Ababa
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-meridian_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-meridian_password}
      MERIDIAN_BOOTSTRAP_ADMIN_USERNAME: ${MERIDIAN_BOOTSTRAP_ADMIN_USERNAME:-admin}
      MERIDIAN_BOOTSTRAP_ADMIN_PASSWORD: ${MERIDIAN_BOOTSTRAP_ADMIN_PASSWORD:-LocalDevAdmin!2026}
      MERIDIAN_DATA_ENCRYPTION_KEY: ${MERIDIAN_DATA_ENCRYPTION_KEY:-ABCDEFGHIJKLMNOPQRSTUVWXYZ123456}
      MERIDIAN_REPORTING_SHARED_FOLDER: ${MERIDIAN_REPORTING_SHARED_FOLDER:-/tmp/meridian-report-packages}
      MERIDIAN_REPORTING_RETENTION_DAYS: ${MERIDIAN_REPORTING_RETENTION_DAYS:-90}
      TZ: ${TZ:-Africa/Addis_Ababa}
    ports:
      - "${APP_HOST_PORT:-18080}:8080"
    volumes:
      - ./backend:/workspace/backend
      - m2-cache:/root/.m2
    command: ["sh", "-c", "mvn -DskipTests spring-boot:run"]

volumes:
  m2-cache:
