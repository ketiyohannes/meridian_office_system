<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>Health Monitor</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <style>
        .panel { background:#fff; border:1px solid #dbe3ee; border-radius:12px; padding:16px; margin-bottom:16px; }
        .grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
        table th, table td { text-align:left; padding:8px; border-bottom:1px solid #edf2f7; vertical-align:top; }
        .pill { display:inline-block; padding:2px 8px; border-radius:999px; background:#fee2e2; color:#991b1b; font-size:12px; }
        .ok { background:#dcfce7; color:#166534; }
        @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<header class="topbar">
    <div>
        <h1>Admin Health Screen</h1>
        <p>Structured local monitoring and threshold alerts</p>
    </div>
    <div><a th:href="@{/}">Home</a></div>
</header>

<main class="content">
    <div id="error" class="alert error" style="display:none;"></div>
    <div id="success" class="alert success" style="display:none;"></div>

    <section class="panel">
        <h2>5xx Health Summary (Last Window)</h2>
        <div id="summary">Loading...</div>
    </section>

    <div class="grid">
        <section class="panel">
            <h3>Thresholds</h3>
            <table style="width:100%; border-collapse:collapse;">
                <thead>
                <tr><th>Metric</th><th>Window</th><th>Threshold %</th><th>Enabled</th><th></th></tr>
                </thead>
                <tbody id="thresholdRows"></tbody>
            </table>
        </section>

        <section class="panel">
            <h3>Recent Alerts</h3>
            <table style="width:100%; border-collapse:collapse;">
                <thead>
                <tr><th>Metric</th><th>Actual %</th><th>Threshold %</th><th>State</th><th></th></tr>
                </thead>
                <tbody id="alertRows"></tbody>
            </table>
        </section>
    </div>

    <section class="panel">
        <h3>Recent Error Logs</h3>
        <table style="width:100%; border-collapse:collapse;">
            <thead>
            <tr><th>Time</th><th>Status</th><th>Path</th><th>Message</th></tr>
            </thead>
            <tbody id="errorRows"></tbody>
        </table>
    </section>
</main>

<script>
    const csrfToken = document.querySelector("meta[name='_csrf']").getAttribute("content");
    const csrfHeader = document.querySelector("meta[name='_csrf_header']").getAttribute("content");
    const headers = {"Content-Type": "application/json"};
    headers[csrfHeader] = csrfToken;

    const errorBox = document.getElementById("error");
    const successBox = document.getElementById("success");

    function showError(msg) {
        errorBox.textContent = msg;
        errorBox.style.display = "block";
    }
    function showSuccess(msg) {
        successBox.textContent = msg;
        successBox.style.display = "block";
        setTimeout(() => { successBox.style.display = "none"; }, 2400);
    }

    async function loadSummary() {
        const res = await fetch("/api/admin/health/summary");
        const body = await res.json();
        if (!res.ok) {
            showError(body.message || "Failed to load summary");
            return;
        }
        const summary = document.getElementById("summary");
        summary.textContent = "";
        const metric = document.createElement("strong");
        metric.textContent = String(body.metricCode);
        const windowMinutes = document.createElement("strong");
        windowMinutes.textContent = String(body.windowMinutes) + " min";
        const actualRate = document.createElement("strong");
        actualRate.textContent = Number(body.actualPercent).toFixed(2) + "%";
        const state = document.createElement("span");
        state.className = body.alerting ? "pill" : "pill ok";
        state.textContent = body.alerting ? "ALERT" : "OK";
        summary.append("Metric ", metric, " | Window ", windowMinutes, " | 5xx Rate ", actualRate);
        summary.append(` (threshold ${Number(body.thresholdPercent).toFixed(2)}%) | `);
        summary.append(`Requests ${body.totalRequests}, Errors ${body.errorRequests} | `, state);
    }

    async function loadThresholds() {
        const res = await fetch("/api/admin/health/thresholds");
        const body = await res.json();
        if (!res.ok) {
            showError(body.message || "Failed to load thresholds");
            return;
        }
        const tbody = document.getElementById("thresholdRows");
        tbody.textContent = "";
        body.forEach((t) => {
            const tr = document.createElement("tr");
            const metricTd = document.createElement("td");
            metricTd.textContent = String(t.metricCode);

            const windowTd = document.createElement("td");
            const windowInput = document.createElement("input");
            windowInput.type = "number";
            windowInput.min = "1";
            windowInput.max = "240";
            windowInput.value = String(t.windowMinutes);
            windowInput.setAttribute("data-f", "w");
            windowTd.appendChild(windowInput);

            const thresholdTd = document.createElement("td");
            const thresholdInput = document.createElement("input");
            thresholdInput.type = "number";
            thresholdInput.min = "0.001";
            thresholdInput.max = "100";
            thresholdInput.step = "0.001";
            thresholdInput.value = String(t.thresholdPercent);
            thresholdInput.setAttribute("data-f", "p");
            thresholdTd.appendChild(thresholdInput);

            const enabledTd = document.createElement("td");
            const enabledInput = document.createElement("input");
            enabledInput.type = "checkbox";
            enabledInput.checked = !!t.enabled;
            enabledInput.setAttribute("data-f", "e");
            enabledTd.appendChild(enabledInput);

            const actionTd = document.createElement("td");
            const saveBtn = document.createElement("button");
            saveBtn.type = "button";
            saveBtn.textContent = "Save";
            actionTd.appendChild(saveBtn);

            tr.appendChild(metricTd);
            tr.appendChild(windowTd);
            tr.appendChild(thresholdTd);
            tr.appendChild(enabledTd);
            tr.appendChild(actionTd);

            saveBtn.onclick = async () => {
                const payload = {
                    windowMinutes: Number(windowInput.value),
                    thresholdPercent: Number(thresholdInput.value),
                    enabled: enabledInput.checked
                };
                const r = await fetch("/api/admin/health/thresholds/" + encodeURIComponent(t.metricCode), {
                    method: "PUT",
                    credentials: "same-origin",
                    headers: headers,
                    body: JSON.stringify(payload)
                });
                const b = await r.json();
                if (!r.ok) {
                    showError(b.message || (b.details && b.details.join(", ")) || "Threshold update failed");
                    return;
                }
                showSuccess("Threshold updated.");
                await loadSummary();
            };
            tbody.appendChild(tr);
        });
    }

    async function loadAlerts() {
        const res = await fetch("/api/admin/health/alerts?resolved=false&page=0&size=10");
        const body = await res.json();
        if (!res.ok) {
            showError(body.message || "Failed to load alerts");
            return;
        }
        const tbody = document.getElementById("alertRows");
        tbody.textContent = "";
        body.content.forEach((a) => {
            const tr = document.createElement("tr");
            const metricTd = document.createElement("td");
            metricTd.textContent = String(a.metricCode);
            const actualTd = document.createElement("td");
            actualTd.textContent = Number(a.actualPercent).toFixed(2);
            const thresholdTd = document.createElement("td");
            thresholdTd.textContent = Number(a.thresholdPercent).toFixed(2);
            const stateTd = document.createElement("td");
            stateTd.textContent = a.resolved ? "Resolved" : "Open";
            const actionTd = document.createElement("td");

            tr.appendChild(metricTd);
            tr.appendChild(actualTd);
            tr.appendChild(thresholdTd);
            tr.appendChild(stateTd);
            tr.appendChild(actionTd);

            if (!a.resolved) {
                const btn = document.createElement("button");
                btn.type = "button";
                btn.textContent = "Resolve";
                btn.onclick = async () => {
                    const r = await fetch("/api/admin/health/alerts/" + a.id + "/resolve", {
                        method: "PUT",
                        credentials: "same-origin",
                        headers: headers
                    });
                    if (!r.ok) {
                        const b = await r.json();
                        showError(b.message || "Unable to resolve alert");
                        return;
                    }
                    showSuccess("Alert resolved.");
                    await loadAlerts();
                };
                actionTd.appendChild(btn);
            }
            tbody.appendChild(tr);
        });
    }

    async function loadErrors() {
        const res = await fetch("/api/admin/health/errors?page=0&size=20");
        const body = await res.json();
        if (!res.ok) {
            showError(body.message || "Failed to load errors");
            return;
        }
        const tbody = document.getElementById("errorRows");
        tbody.textContent = "";
        body.content.forEach((e) => {
            const tr = document.createElement("tr");
            const occurredTd = document.createElement("td");
            occurredTd.textContent = new Date(e.occurredAt).toLocaleString();
            const statusTd = document.createElement("td");
            statusTd.textContent = String(e.statusCode);
            const pathTd = document.createElement("td");
            pathTd.textContent = String(e.requestPath);
            const messageTd = document.createElement("td");
            messageTd.textContent = String(e.message);
            tr.appendChild(occurredTd);
            tr.appendChild(statusTd);
            tr.appendChild(pathTd);
            tr.appendChild(messageTd);
            tbody.appendChild(tr);
        });
    }

    loadSummary();
    loadThresholds();
    loadAlerts();
    loadErrors();
</script>
</body>
</html>
