<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin User Management</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topbar">
    <div>
        <h1>Admin User Management</h1>
        <p>Manage users, roles, and credentials</p>
    </div>
    <div>
        <a th:href="@{/}">Home</a>
        <a th:href="@{/admin/audit-logs}" style="margin-left: 12px;">Audit Logs</a>
    </div>
</header>

<main class="content">
    <section class="card" th:if="${successMessage}">
        <div class="alert success" th:text="${successMessage}">Done.</div>
    </section>
    <section class="card" th:if="${errorMessage}">
        <div class="alert error" th:text="${errorMessage}">Error.</div>
    </section>

    <section class="card">
        <h2>Create User</h2>
        <div class="alert error" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>

        <form th:action="@{/admin/users}" th:object="${createUserForm}" method="post" class="auth-form">
            <label for="username">Username</label>
            <input id="username" type="text" th:field="*{username}" minlength="3" maxlength="64" required>
            <div class="alert error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>

            <label for="password">Password</label>
            <input id="password" type="password" th:field="*{password}" minlength="12" required>
            <div class="alert error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>

            <label for="confirmPassword">Confirm Password</label>
            <input id="confirmPassword" type="password" th:field="*{confirmPassword}" minlength="12" required>
            <div class="alert error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>

            <label>Roles</label>
            <div th:each="role : ${allRoles}">
                <label>
                    <input type="checkbox" th:field="*{roles}" th:value="${role}">
                    <span th:text="${role}">ADMIN</span>
                </label>
            </div>
            <div class="alert error" th:if="${#fields.hasErrors('roles')}" th:errors="*{roles}"></div>

            <label>
                <input type="checkbox" th:field="*{enabled}">
                Enabled
            </label>

            <label for="employeeIdentifier">Employee Identifier (sensitive)</label>
            <input id="employeeIdentifier" type="text" th:field="*{employeeIdentifier}" maxlength="128">
            <div class="alert error" th:if="${#fields.hasErrors('employeeIdentifier')}" th:errors="*{employeeIdentifier}"></div>

            <label for="contactField">Contact Field (sensitive)</label>
            <input id="contactField" type="text" th:field="*{contactField}" maxlength="128">
            <div class="alert error" th:if="${#fields.hasErrors('contactField')}" th:errors="*{contactField}"></div>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Create User</button>
        </form>
    </section>

    <section class="card">
        <h2>Existing Users</h2>
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
            <tr>
                <th style="text-align:left;">Username</th>
                <th style="text-align:left;">Roles</th>
                <th style="text-align:left;">Enabled</th>
                <th style="text-align:left;">Employee ID</th>
                <th style="text-align:left;">Contact</th>
                <th style="text-align:left;">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${users}">
                <td th:text="${u.username}">admin</td>
                <td th:text="${#strings.listJoin(u.roles, ', ')}">ADMIN</td>
                <td th:text="${u.enabled ? 'Yes' : 'No'}">Yes</td>
                <td th:text="${u.maskedEmployeeIdentifier != null ? u.maskedEmployeeIdentifier : '-'}">******1234</td>
                <td th:text="${u.maskedContactField != null ? u.maskedContactField : '-'}">******5678</td>
                <td><a th:href="@{/admin/users/{id}(id=${u.id})}">Manage</a></td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
