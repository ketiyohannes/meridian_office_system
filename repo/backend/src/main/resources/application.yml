spring:
  application:
    name: meridian-portal
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/meridian?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Africa/Addis_Ababa}
    username: ${SPRING_DATASOURCE_USERNAME:meridian_user}
    password: ${SPRING_DATASOURCE_PASSWORD:meridian_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  thymeleaf:
    cache: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    deserialization:
      fail-on-unknown-properties: true

server:
  servlet:
    session:
      timeout: 30m

logging:
  level:
    root: INFO
    com.meridian.portal: INFO

meridian:
  auth:
    min-password-length: 12
    max-failed-attempts: 5
    lockout-minutes: 15
    bootstrap-admin-username: ${MERIDIAN_BOOTSTRAP_ADMIN_USERNAME:admin}
    bootstrap-admin-password: ${MERIDIAN_BOOTSTRAP_ADMIN_PASSWORD}
  reporting:
    shared-folder: ${MERIDIAN_REPORTING_SHARED_FOLDER:/tmp/meridian-report-packages}
    retention-days: ${MERIDIAN_REPORTING_RETENTION_DAYS:90}
  security:
    data-encryption-key: ${MERIDIAN_DATA_ENCRYPTION_KEY}
