<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage User</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topbar">
    <div>
        <h1>User Detail</h1>
        <p th:text="'Managing: ' + ${managedUser.username}">Managing user</p>
    </div>
    <div>
        <a th:href="@{/admin/users}">Back to User List</a>
        <a th:href="@{/admin/audit-logs}" style="margin-left: 12px;">Audit Logs</a>
    </div>
</header>

<main class="content">
    <section class="card" th:if="${successMessage}">
        <div class="alert success" th:text="${successMessage}">Done.</div>
    </section>
    <section class="card" th:if="${errorMessage}">
        <div class="alert error" th:text="${errorMessage}">Error.</div>
    </section>

    <section class="card">
        <h2>Account Status</h2>
        <p><strong>Enabled:</strong> <span th:text="${managedUser.enabled ? 'Yes' : 'No'}">Yes</span></p>
        <p><strong>Locked Until:</strong> <span th:text="${managedUser.lockedUntil != null ? managedUser.lockedUntil : 'Not locked'}">Not locked</span></p>
        <p><strong>Masked Employee ID:</strong> <span th:text="${managedUser.maskedEmployeeIdentifier != null ? managedUser.maskedEmployeeIdentifier : '-'}">******1234</span></p>
        <p><strong>Masked Contact:</strong> <span th:text="${managedUser.maskedContactField != null ? managedUser.maskedContactField : '-'}">******5678</span></p>

        <form th:action="@{/admin/users/{id}/enabled(id=${managedUser.id})}" th:object="${enabledForm}" method="post" class="auth-form">
            <label>
                <input type="checkbox" th:field="*{enabled}">
                Enabled
            </label>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Update Status</button>
        </form>
    </section>

    <section class="card">
        <h2>Sensitive Profile Fields</h2>
        <form th:action="@{/admin/users/{id}/profile(id=${managedUser.id})}" th:object="${profileForm}" method="post" class="auth-form">
            <label for="employeeIdentifier">Employee Identifier (stored encrypted)</label>
            <input id="employeeIdentifier" type="text" th:field="*{employeeIdentifier}" maxlength="128">
            <div class="alert error" th:if="${#fields.hasErrors('employeeIdentifier')}" th:errors="*{employeeIdentifier}"></div>

            <label for="contactField">Contact Field (stored encrypted)</label>
            <input id="contactField" type="text" th:field="*{contactField}" maxlength="128">
            <div class="alert error" th:if="${#fields.hasErrors('contactField')}" th:errors="*{contactField}"></div>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Update Sensitive Fields</button>
        </form>
    </section>

    <section class="card">
        <h2>Role Assignment</h2>
        <form th:action="@{/admin/users/{id}/roles(id=${managedUser.id})}" th:object="${rolesForm}" method="post" class="auth-form">
            <div th:each="role : ${allRoles}">
                <label>
                    <input type="checkbox" th:field="*{roles}" th:value="${role}">
                    <span th:text="${role}">ADMIN</span>
                </label>
            </div>
            <div class="alert error" th:if="${#fields.hasErrors('roles')}" th:errors="*{roles}"></div>
            <div class="alert error" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Update Roles</button>
        </form>
    </section>

    <section class="card">
        <h2>Reset Password</h2>
        <form th:action="@{/admin/users/{id}/password(id=${managedUser.id})}" th:object="${passwordForm}" method="post" class="auth-form">
            <label for="password">New Password</label>
            <input id="password" type="password" th:field="*{password}" minlength="12" required>
            <div class="alert error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>

            <label for="confirmPassword">Confirm Password</label>
            <input id="confirmPassword" type="password" th:field="*{confirmPassword}" minlength="12" required>
            <div class="alert error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
            <div class="alert error" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Reset Password</button>
        </form>
    </section>
</main>
</body>
</html>
